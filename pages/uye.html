<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Üye Girişi — IRONPEAK GYM</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body { background: #0a0a0a; }

    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 3rem;
      width: 100%;
      max-width: 440px;
    }

    .auth-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: .1em;
      color: #f5f0eb;
      text-decoration: none;
      display: block;
      margin-bottom: 2rem;
      text-align: center;
    }
    .auth-logo span { color: #e63c2f; }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
    }
    .auth-tab {
      flex: 1;
      padding: .75rem;
      background: transparent;
      border: none;
      color: #888;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      letter-spacing: .08em;
      cursor: pointer;
      transition: .2s;
    }
    .auth-tab.active {
      background: #e63c2f;
      color: #fff;
    }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .field { margin-bottom: 1.2rem; }
    .field label {
      display: block;
      margin-bottom: .4rem;
      color: #888;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .8rem;
      letter-spacing: .1em;
    }
    .field input {
      width: 100%;
      background: #181818;
      border: 1px solid #2a2a2a;
      color: #f5f0eb;
      padding: .85rem 1rem;
      border-radius: 6px;
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
      transition: border-color .2s;
    }
    .field input:focus { border-color: #e63c2f; }

    .auth-submit {
      width: 100%;
      padding: 1rem;
      background: #e63c2f;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: .08em;
      cursor: pointer;
      transition: opacity .2s;
      margin-top: .5rem;
    }
    .auth-submit:disabled { opacity: .5; cursor: not-allowed; }

    .fb-alert {
      display: none;
      padding: .9rem 1.2rem;
      border-radius: 6px;
      font-size: .9rem;
      margin-bottom: 1.2rem;
      font-family: 'Barlow', sans-serif;
    }
    .fb-alert.success { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.4); color: #22c55e; }
    .fb-alert.error   { background: rgba(230,60,47,.12);  border: 1px solid rgba(230,60,47,.4);  color: #e63c2f; }
    .fb-alert.show    { display: block; }

    .spinner {
      display: inline-block; width:14px; height:14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius:50%;
      animation: spin .6s linear infinite;
      margin-right:6px; vertical-align:middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Üye paneli (giriş sonrası) */
    .member-panel { display: none; }
    .member-panel.show { display: block; }
    .auth-card-main { display: block; }
    .auth-card-main.hide { display: none; }

    .workout-log {
      margin-top: 1.5rem;
      display: grid;
      gap: .8rem;
    }
    .workout-row {
      background: #181818;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .workout-row .wr-left strong {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      letter-spacing: .05em;
      color: #f5f0eb;
    }
    .workout-row .wr-left small {
      color: #666;
      font-size: .8rem;
    }
    .workout-row .wr-right {
      color: #e63c2f;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
    }
    .btn-del {
      background: none;
      border: 1px solid #333;
      color: #666;
      padding: .3rem .7rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: .75rem;
      margin-left: .8rem;
      transition: .2s;
    }
    .btn-del:hover { border-color: #e63c2f; color: #e63c2f; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="../index.html" class="nav-logo">IRON<span>PEAK</span></a>
  <ul class="nav-links">
    <li><a href="../index.html">Anasayfa</a></li>
    <li><a href="../index.html#hareketler">Hareketler</a></li>
    <li><a href="../index.html#program">Program</a></li>
    <li><a href="about.html">Hakkımızda</a></li>
    <li><a href="contact.html">İletişim</a></li>
    <li><a href="uye.html" class="active">Üye</a></li>
  </ul>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>

<div class="auth-wrapper">

  <!-- ── AUTH KARTI (Giriş/Kayıt) ── -->
  <div class="auth-card" id="authCard">

    <a href="../index.html" class="auth-logo">IRON<span>PEAK</span></a>

    <div id="authAlert" class="fb-alert"></div>

    <!-- Sekmeler -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">GİRİŞ YAP</button>
      <button class="auth-tab"        id="tabRegister" onclick="switchTab('register')">KAYIT OL</button>
    </div>

    <!-- Giriş Formu -->
    <div id="loginForm" class="auth-form active">
      <div class="field">
        <label>E-POSTA</label>
        <input type="email" id="loginEmail" placeholder="ornek@email.com">
      </div>
      <div class="field">
        <label>ŞİFRE</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="auth-submit" id="loginBtn" onclick="handleLogin()">GİRİŞ YAP</button>
    </div>

    <!-- Kayıt Formu -->
    <div id="registerForm" class="auth-form">
      <div class="field">
        <label>ADINIZ SOYADINIZ</label>
        <input type="text" id="regName" placeholder="Ad Soyad">
      </div>
      <div class="field">
        <label>E-POSTA</label>
        <input type="email" id="regEmail" placeholder="ornek@email.com">
      </div>
      <div class="field">
        <label>ŞİFRE (min. 6 karakter)</label>
        <input type="password" id="regPassword" placeholder="••••••••">
      </div>
      <button class="auth-submit" id="registerBtn" onclick="handleRegister()">HESAP OLUŞTUR</button>
    </div>

  </div><!-- /auth-card -->

  <!-- ── ÜYE PANELİ (giriş yapıldıktan sonra) ── -->
  <div class="auth-card member-panel" id="memberPanel">

    <a href="../index.html" class="auth-logo">IRON<span>PEAK</span></a>

    <div id="memberAlert" class="fb-alert"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.06em;">
          HOŞ GELDİN, <span id="memberName" style="color:#e63c2f;"></span>
        </div>
        <div style="color:#666;font-size:.85rem;font-family:'Barlow',sans-serif;" id="memberEmail"></div>
      </div>
      <button onclick="handleLogout()" style="background:none;border:1px solid #333;color:#888;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;">
        ÇIKIŞ
      </button>
    </div>

    <!-- Antrenman Kaydet -->
    <div style="background:#181818;border:1px solid #222;border-radius:10px;padding:1.5rem;margin-bottom:1.5rem;">
      <div style="font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;color:#aaa;margin-bottom:1rem;font-size:.9rem;">ANTRENMAN KAYDET</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem;">
        <div class="field" style="margin:0;">
          <label>HAREKET</label>
          <input type="text" id="wkExercise" placeholder="Bench Press">
        </div>
        <div class="field" style="margin:0;">
          <label>KAS GRUBU</label>
          <select id="wkMuscle" style="width:100%;background:#111;border:1px solid #2a2a2a;color:#f5f0eb;padding:.85rem .8rem;border-radius:6px;font-family:'Barlow',sans-serif;font-size:.95rem;outline:none;">
            <option value="">Seç...</option>
            <option>Göğüs</option><option>Sırt</option><option>Omuz</option>
            <option>Biceps</option><option>Triceps</option><option>Bacak</option><option>Core</option>
          </select>
        </div>
        <div class="field" style="margin:0;">
          <label>SET</label>
          <input type="number" id="wkSets" placeholder="3" min="1">
        </div>
        <div class="field" style="margin:0;">
          <label>TEKRAR</label>
          <input type="number" id="wkReps" placeholder="10" min="1">
        </div>
        <div class="field" style="margin:0;">
          <label>KİLO (kg)</label>
          <input type="number" id="wkWeight" placeholder="60" min="0">
        </div>
        <div class="field" style="margin:0;">
          <label>NOT</label>
          <input type="text" id="wkNotes" placeholder="İsteğe bağlı">
        </div>
      </div>

      <button class="auth-submit" style="margin-top:.5rem;" id="saveWorkoutBtn" onclick="handleSaveWorkout()">
        KAYDET
      </button>
    </div>

    <!-- Antrenman Geçmişi -->
    <div style="font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;color:#aaa;font-size:.9rem;margin-bottom:.8rem;">
      ANTRENMAN GEÇMİŞİ
    </div>
    <div id="workoutList" class="workout-log">
      <div style="color:#555;font-size:.9rem;text-align:center;padding:1rem;">Henüz antrenman kaydedilmedi.</div>
    </div>

  </div><!-- /member-panel -->

</div><!-- /auth-wrapper -->

<script src="../assets/js/java.js"></script>

<script type="module">
  import { registerUser, loginUser, logoutUser, onAuthChange } from "../assets/js/firebase-auth.js";
  import { addWorkout, getMyWorkouts, deleteWorkout }          from "../assets/js/firebase-workouts.js";

  // ── Yardımcı: sekme geçişi ───────────────────────────────
  window.switchTab = (tab) => {
    document.getElementById("loginForm").classList.toggle("active", tab === "login");
    document.getElementById("registerForm").classList.toggle("active", tab === "register");
    document.getElementById("tabLogin").classList.toggle("active", tab === "login");
    document.getElementById("tabRegister").classList.toggle("active", tab === "register");
  };

  function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `fb-alert ${type} show`;
    el.textContent = msg;
    setTimeout(() => { el.className = "fb-alert"; }, 6000);
  }

  function setBtn(id, loading, text) {
    const btn = document.getElementById(id);
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
  }

  // ── Oturum değişikliği dinle ─────────────────────────────
  onAuthChange((user) => {
    const authCard    = document.getElementById("authCard");
    const memberPanel = document.getElementById("memberPanel");
    if (user) {
      authCard.style.display    = "none";
      memberPanel.classList.add("show");
      document.getElementById("memberName").textContent  = user.displayName || "Üye";
      document.getElementById("memberEmail").textContent = user.email;
      loadWorkouts();
    } else {
      authCard.style.display    = "block";
      memberPanel.classList.remove("show");
    }
  });

  // ── Giriş ────────────────────────────────────────────────
  window.handleLogin = async () => {
    const email    = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    setBtn("loginBtn", true, "GİRİŞ YAPILIYOR...");
    try {
      await loginUser(email, password);
    } catch (err) {
      const msg = err.code === "auth/invalid-credential"
        ? "E-posta veya şifre hatalı."
        : err.message;
      showAlert("authAlert", "error", `❌ ${msg}`);
    } finally {
      setBtn("loginBtn", false, "GİRİŞ YAP");
    }
  };

  // ── Kayıt ────────────────────────────────────────────────
  window.handleRegister = async () => {
    const name     = document.getElementById("regName").value.trim();
    const email    = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    if (!name) { showAlert("authAlert", "error", "❌ Adınızı girin."); return; }
    setBtn("registerBtn", true, "OLUŞTURULUYOR...");
    try {
      await registerUser(name, email, password);
      showAlert("authAlert", "success", "✅ Hesabınız oluşturuldu!");
    } catch (err) {
      const msg = err.code === "auth/email-already-in-use"
        ? "Bu e-posta zaten kayıtlı."
        : err.code === "auth/weak-password"
        ? "Şifre en az 6 karakter olmalı."
        : err.message;
      showAlert("authAlert", "error", `❌ ${msg}`);
    } finally {
      setBtn("registerBtn", false, "HESAP OLUŞTUR");
    }
  };

  // ── Çıkış ────────────────────────────────────────────────
  window.handleLogout = async () => {
    await logoutUser();
  };

  // ── Antrenman Kaydet ─────────────────────────────────────
  window.handleSaveWorkout = async () => {
    const data = {
      exerciseName: document.getElementById("wkExercise").value.trim(),
      muscleGroup:  document.getElementById("wkMuscle").value,
      sets:         parseInt(document.getElementById("wkSets").value) || 0,
      reps:         parseInt(document.getElementById("wkReps").value) || 0,
      weight:       parseFloat(document.getElementById("wkWeight").value) || 0,
      notes:        document.getElementById("wkNotes").value.trim(),
    };
    if (!data.exerciseName) {
      showAlert("memberAlert", "error", "❌ Hareket adını girin."); return;
    }
    setBtn("saveWorkoutBtn", true, "KAYDEDİLİYOR...");
    try {
      await addWorkout(data);
      // Formu temizle
      ["wkExercise","wkMuscle","wkSets","wkReps","wkWeight","wkNotes"]
        .forEach(id => { document.getElementById(id).value = ""; });
      showAlert("memberAlert", "success", "✅ Antrenman kaydedildi!");
      loadWorkouts();
    } catch (err) {
      showAlert("memberAlert", "error", `❌ ${err.message}`);
    } finally {
      setBtn("saveWorkoutBtn", false, "KAYDET");
    }
  };

  // ── Antrenmanları Yükle ──────────────────────────────────
  async function loadWorkouts() {
    const list = document.getElementById("workoutList");
    list.innerHTML = `<div style="color:#555;text-align:center;padding:1rem;">Yükleniyor...</div>`;
    try {
      const workouts = await getMyWorkouts();
      if (!workouts.length) {
        list.innerHTML = `<div style="color:#555;font-size:.9rem;text-align:center;padding:1rem;">Henüz antrenman kaydedilmedi.</div>`;
        return;
      }
      list.innerHTML = workouts.map(w => {
        const date = w.createdAt?.toDate
          ? w.createdAt.toDate().toLocaleDateString("tr-TR")
          : "—";
        return `
          <div class="workout-row">
            <div class="wr-left">
              <strong>${w.exerciseName} <span style="color:#555;font-size:.8rem;">(${w.muscleGroup || "—"})</span></strong>
              <small>${w.sets} set × ${w.reps} tekrar · ${w.weight} kg · ${date}</small>
              ${w.notes ? `<small style="display:block;color:#555;margin-top:2px;">${w.notes}</small>` : ""}
            </div>
            <div class="wr-right">
              ${w.sets * w.reps * w.weight ? (w.sets * w.reps * w.weight).toLocaleString("tr-TR") + "<small style='font-size:.65rem;color:#666;'> kg vol</small>" : ""}
              <button class="btn-del" onclick="handleDelete('${w.id}')">SİL</button>
            </div>
          </div>`;
      }).join("");
    } catch (err) {
      list.innerHTML = `<div style="color:#e63c2f;font-size:.9rem;">${err.message}</div>`;
    }
  }

  // ── Antrenman Sil ────────────────────────────────────────
  window.handleDelete = async (id) => {
    if (!confirm("Bu antrenmanı silmek istiyor musunuz?")) return;
    try {
      await deleteWorkout(id);
      loadWorkouts();
    } catch (err) {
      showAlert("memberAlert", "error", `❌ ${err.message}`);
    }
  };
</script>

</body>
</html>
